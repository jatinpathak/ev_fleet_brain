# One-command run of the full stack: dashboard + REST API.
#   docker compose up
# Dashboard -> http://localhost:8501    API docs -> http://localhost:8000/docs
services:
  dashboard:
    build: .
    image: ev-fleet-brain
    ports:
      - "8501:8501"
    environment:
      # Optional: enable the live LLM copilot (otherwise it uses fallbacks).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0

  api:
    image: ev-fleet-brain
    build: .
    ports:
      - "8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    depends_on:
      - dashboard
